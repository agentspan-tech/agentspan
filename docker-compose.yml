services:
  postgres:
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentorbit}
      POSTGRES_USER: ${POSTGRES_USER:-agentorbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentorbit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentorbit} -d ${POSTGRES_DB:-agentorbit}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  processing:
    build:
      context: .
      dockerfile: processing/Dockerfile
    env_file: .env
    environment:
      # Override sslmode for Docker internal network (postgres container has no TLS)
      DATABASE_URL: postgres://${POSTGRES_USER:-agentorbit}:${POSTGRES_PASSWORD:-agentorbit}@postgres:5432/${POSTGRES_DB:-agentorbit}?sslmode=disable
    ports:
      - "127.0.0.1:${PROCESSING_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    env_file: .env
    ports:
      - "127.0.0.1:${PROXY_PORT:-8080}:8080"
    depends_on:
      processing:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
