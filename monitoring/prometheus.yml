global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "proxy"
    static_configs:
      - targets: ["proxy:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "processing"
    static_configs:
      - targets: ["processing:8081"]
    metrics_path: /metrics
    scrape_interval: 10s
