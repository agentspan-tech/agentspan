name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  PROXY_IMAGE: ghcr.io/agentorbit-tech/agentorbit-proxy
  PROCESSING_IMAGE: ghcr.io/agentorbit-tech/agentorbit-processing

jobs:
  # Build and push multi-arch Docker images.
  # Proxy and processing are split into separate matrix jobs so they run on
  # different runners in parallel — the slow processing build no longer
  # serialises behind (or in front of) the fast proxy build.
  docker:
    name: Docker Image (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: proxy
            dockerfile: proxy/Dockerfile
            tag_image: ghcr.io/agentorbit-tech/agentorbit-proxy
            cache_scope: proxy
          - image: processing
            dockerfile: processing/Dockerfile
            tag_image: ghcr.io/agentorbit-tech/agentorbit-processing
            cache_scope: processing
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ matrix.tag_image }}:${{ github.ref_name }}
            ${{ matrix.tag_image }}:latest
          # Per-image cache scope — without it both jobs would clobber each
          # other's cache on the same key and the savings would be lost.
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  # Build the frontend once and share it with all binary matrix jobs. Without
  # this, every matrix shard re-ran `npm ci` + `vite build` even though the
  # output is platform-independent — wasting ~4× the work.
  frontend:
    name: Frontend Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # Cross-compile Go binaries. Frontend dist is downloaded as an artifact from
  # the frontend job above instead of being rebuilt per-shard.
  binaries:
    name: Binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: |
            proxy/go.sum
            processing/go.sum

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/dist

      - name: Build proxy
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o agentorbit-proxy-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proxy/
        working-directory: proxy

      - name: Build processing
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cp -r ../web/dist ./web/dist
          go build -ldflags="-s -w" \
            -o agentorbit-processing-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/processing/
        working-directory: processing

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            proxy/agentorbit-proxy-*
            processing/agentorbit-processing-*

  # Create GitHub Release with binaries attached
  release:
    name: GitHub Release
    needs: [docker, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Prepare release body
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "body_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: true
          files: |
            agentorbit-proxy-*
            agentorbit-processing-*

  # Trigger cloud deployment
  trigger-deploy:
    name: Trigger Cloud Deploy
    needs: [docker]
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          repository: agentorbit-tech/agentorbit-deploy
          event-type: new-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
