name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  PROXY_IMAGE: ghcr.io/agentorbit-tech/agentorbit-proxy
  PROCESSING_IMAGE: ghcr.io/agentorbit-tech/agentorbit-processing

jobs:
  # Build and push multi-arch Docker images
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push proxy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: proxy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.PROXY_IMAGE }}:${{ github.ref_name }}
            ${{ env.PROXY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push processing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: processing/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.PROCESSING_IMAGE }}:${{ github.ref_name }}
            ${{ env.PROCESSING_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Cross-compile Go binaries
  binaries:
    name: Binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: |
            proxy/go.sum
            processing/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Build frontend (processing binary embeds it)
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build proxy
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o agentorbit-proxy-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proxy/
        working-directory: proxy

      - name: Build processing
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cp -r ../web/dist ./web/dist
          go build -ldflags="-s -w" \
            -o agentorbit-processing-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/processing/
        working-directory: processing

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            proxy/agentorbit-proxy-*
            processing/agentorbit-processing-*

  # Create GitHub Release with binaries attached
  release:
    name: GitHub Release
    needs: [docker, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Prepare release body
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "body_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: true
          files: |
            agentorbit-proxy-*
            agentorbit-processing-*

  # Trigger cloud deployment
  trigger-deploy:
    name: Trigger Cloud Deploy
    needs: [docker]
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          repository: agentorbit-tech/agentorbit-deploy
          event-type: new-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
